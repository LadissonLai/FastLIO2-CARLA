common:
    lid_topic:  "/points_raw"
    imu_topic:  "/carla/ego_vehicle/imu"
    time_sync_en: false

preprocess:
    lidar_type: 2
    scan_line: 32
    timestamp_unit: 2
    blind: 1.0

mapping:
    acc_cov: 0.1
    gyr_cov: 0.1
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001
    fov_degree: 180.0
    det_range: 50.0
    extrinsic_est_en: false

    extrinsic_T: [0.0, 0.0, 0.0]
    extrinsic_R: [1,0,0, 0,1,0, 0,0,1]

publish:
    path_en: true
    scan_publish_en: true
    dense_publish_en: false
    scan_bodyframe_pub_en: false

pcd_save:
    pcd_save_en: false